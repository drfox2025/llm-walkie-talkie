<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Soft Drop Shadow for the device -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    
    <!-- Glow for active LED -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- White Circular Badge -->
  <circle cx="256" cy="256" r="236" fill="#ffffff" stroke="#e2e8f0" stroke-width="8" />

  <!-- BOLD SIDE AUDIO SIGNAL WAVES (Inside the badge) -->
  <!-- Left Waves -->
  <path d="M 126 186 A 100 100 0 0 0 126 326" fill="none" stroke="#ea580c" stroke-width="24" stroke-linecap="round" />
  <path d="M 96 156 A 140 140 0 0 0 96 356" fill="none" stroke="#ea580c" stroke-width="18" stroke-linecap="round" opacity="0.7" />
  <path d="M 66 126 A 180 180 0 0 0 66 386" fill="none" stroke="#ea580c" stroke-width="12" stroke-linecap="round" opacity="0.4" />

  <!-- Right Waves -->
  <path d="M 386 186 A 100 100 0 0 1 386 326" fill="none" stroke="#ea580c" stroke-width="24" stroke-linecap="round" />
  <path d="M 416 156 A 140 140 0 0 1 416 356" fill="none" stroke="#ea580c" stroke-width="18" stroke-linecap="round" opacity="0.7" />
  <path d="M 446 126 A 180 180 0 0 1 446 386" fill="none" stroke="#ea580c" stroke-width="12" stroke-linecap="round" opacity="0.4" />

  <!-- WALKIE-TALKIE DEVICE -->
  <!-- Antenna Rod -->
  <rect x="244" y="105" width="24" height="60" rx="4" fill="#172554" />
  <!-- Antenna Tip (Orange Dome) -->
  <circle cx="256" cy="100" r="18" fill="#ea580c" />

  <!-- Knobs -->
  <rect x="180" y="145" width="30" height="25" rx="6" fill="#172554" />
  <rect x="302" y="145" width="30" height="25" rx="6" fill="#172554" />

  <!-- Device Body -->
  <rect x="135" y="165" width="242" height="270" rx="35" fill="#1e3a8a" stroke="#172554" stroke-width="8" filter="url(#shadow)" />

  <!-- PTT Side Button -->
  <rect x="127" y="205" width="8" height="60" rx="4" fill="#ea580c" />

  <!-- Screen -->
  <rect x="156" y="185" width="200" height="90" rx="12" fill="#0f172a" stroke="#ea580c" stroke-width="4" />
  
  <!-- Text LWT -->
  <text x="256" y="250" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="62" fill="#ea580c" text-anchor="middle">LWT</text>

  <!-- Speaker Grille Area -->
  <rect x="172" y="300" width="168" height="100" rx="15" fill="#172554" />
  <!-- Speaker Slats -->
  <line x1="188" y1="316" x2="324" y2="316" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round" />
  <line x1="188" y1="328" x2="324" y2="328" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round" />
  <line x1="188" y1="340" x2="324" y2="340" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round" />
  <line x1="188" y1="352" x2="324" y2="352" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round" />
  <line x1="188" y1="364" x2="324" y2="364" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round" />
  <line x1="188" y1="376" x2="324" y2="376" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round" />
  <line x1="188" y1="388" x2="324" y2="388" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round" />

  <!-- Glowing LED Status Light -->
  <circle cx="318" cy="390" r="5" fill="#ea580c" filter="url(#glow)" />
</svg>
